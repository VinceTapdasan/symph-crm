# Symph CRM — Cloud Build: parallel build + deploy
# Triggered via: GitHub Actions on push to main (see .github/workflows/deploy.yml)
# Manual:        gcloud builds submit --config cloudbuild.yaml --substitutions=SHORT_SHA=$(git rev-parse --short HEAD),_API_URL=https://symph-crm-api-t5wb3mrt7q-as.a.run.app .
#
# Substitutions:
#   SHORT_SHA              Built-in: set by Cloud Build on push triggers (7-char commit SHA)
#   _REGION                Cloud Run region
#   _API_URL               Internal API URL for web → api proxy rewrite (server-side)
#   _NEXT_PUBLIC_API_URL   Public API URL baked into browser bundle at build time

substitutions:
  _REGION: asia-southeast1
  _API_SERVICE: symph-crm-api
  _WEB_SERVICE: symph-crm-web
  _API_URL: 'https://symph-crm-api-t5wb3mrt7q-as.a.run.app'
  _NEXT_PUBLIC_API_URL: 'https://symph-crm-api-t5wb3mrt7q-as.a.run.app/api'

steps:
  # ── Step 1a: Build API image (starts immediately)
  - name: 'gcr.io/cloud-builders/docker'
    id: build-api
    waitFor: ['-']
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/api:$SHORT_SHA
      - -t
      - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/api:latest
      - .

  # ── Step 1b: Build web image (starts immediately, parallel with API)
  - name: 'gcr.io/cloud-builders/docker'
    id: build-web
    waitFor: ['-']
    args:
      - build
      - -f
      - Dockerfile.web
      - --build-arg
      - API_URL=$_API_URL
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL
      - -t
      - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/web:$SHORT_SHA
      - -t
      - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/web:latest
      - .

  # ── Step 2a: Push API image (after api build)
  - name: 'gcr.io/cloud-builders/docker'
    id: push-api
    waitFor: [build-api]
    args:
      - push
      - --all-tags
      - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/api

  # ── Step 2b: Push web image (after web build)
  - name: 'gcr.io/cloud-builders/docker'
    id: push-web
    waitFor: [build-web]
    args:
      - push
      - --all-tags
      - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/web

  # ── Step 3a: Deploy API to Cloud Run (after api push)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-api
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_API_SERVICE
      - --image=asia-docker.pkg.dev/$PROJECT_ID/symph-crm/api:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=4000
      - --max-instances=5
      - --set-secrets=DATABASE_URL=symph-crm-db-url:latest,ANTHROPIC_API_KEY=symph-crm-anthropic-key:latest,CRON_SECRET=symph-crm-cron-secret:latest,SUPABASE_URL=symph-crm-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=symph-crm-supabase-service-role:latest,GOOGLE_CLIENT_SECRET=symph-crm-google-client-secret:latest,CALENDAR_ENCRYPTION_KEY=symph-crm-calendar-encryption-key:latest,INTERNAL_SECRET=symph-crm-internal-secret:latest,ARIA_API_TOKEN=symph-crm-aria-api-token:latest
      - --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_APP_URL=https://crm.symph.co,GOOGLE_CLIENT_ID=188047996224-l74ln859dbge5cftjonk6nf8efuv62hb.apps.googleusercontent.com,GOOGLE_CALENDAR_REDIRECT_URI=https://symph-crm-api-t5wb3mrt7q-as.a.run.app/api/auth/google-calendar/callback,WEB_BASE_URL=https://crm.symph.co,ARIA_GATEWAY_URL=https://aria-gateway-canary-7xgremp6pq-as.a.run.app

  # ── Step 3b: Deploy web to Cloud Run (after web push)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-web
    waitFor: [push-web]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_WEB_SERVICE
      - --image=asia-docker.pkg.dev/$PROJECT_ID/symph-crm/web:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --max-instances=5
      - --set-secrets=NEXTAUTH_SECRET=symph-crm-nextauth-secret:latest,GOOGLE_CLIENT_SECRET=symph-crm-google-client-secret:latest,DATABASE_URL=symph-crm-db-url:latest,ANTHROPIC_API_KEY=symph-crm-anthropic-key:latest,CRON_SECRET=symph-crm-cron-secret:latest,INTERNAL_SECRET=symph-crm-internal-secret:latest,ARIA_API_TOKEN=symph-crm-aria-api-token:latest
      - --set-env-vars=NODE_ENV=production,NEXTAUTH_URL=https://crm.symph.co,AUTH_TRUST_HOST=true,NEXT_PUBLIC_APP_URL=https://crm.symph.co,GOOGLE_CLIENT_ID=188047996224-l74ln859dbge5cftjonk6nf8efuv62hb.apps.googleusercontent.com,NEXT_PUBLIC_SUPABASE_URL=https://juiwzbfvuvrtjizedtio.supabase.co,NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1aXd6YmZ2dXZydGppemVkdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDEzNTAsImV4cCI6MjA4OTkxNzM1MH0.KiYcnydCTWVMqvWus7nKoGEfSfmIGQ2oQQ452CehofI,API_URL=$_API_URL,NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL,ARIA_GATEWAY_URL=https://aria-gateway-canary-7xgremp6pq-as.a.run.app

images:
  - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/api:$SHORT_SHA
  - asia-docker.pkg.dev/$PROJECT_ID/symph-crm/web:$SHORT_SHA

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
